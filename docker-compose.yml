services:

  mongodb:

    image: mongo:8
    container_name: notes-mongodb-container
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  backend:

    build:
      context: ./Backend
    image: notes-backend
    container_name: notes-backend-container
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/notesdb
    depends_on:
      - mongodb
    restart: unless-stopped

  frontend:
  
    build:
      context: ./Frontend
    image: notes-frontend
    container_name: notes-frontend-container
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data: