services:
  backend:
    build:
      context: ./Backend
    image: notes-backend
    container_name: notes-backend-container
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://host.docker.internal:27017/notesdb
    restart: unless-stopped

  frontend:
    build:
      context: ./Frontend
    image: notes-frontend
    container_name: notes-frontend-container
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped