name: Notes App CI/CD

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend
        run: |
          docker build -t surajkb2005/notes-backend:latest ./Backend

      - name: Push Backend
        run: |
          docker push surajkb2005/notes-backend:latest

      - name: Build Frontend
        run: |
          docker build -t surajkb2005/notes-frontend:latest ./Frontend

      - name: Push Frontend
        run: |
          docker push surajkb2005/notes-frontend:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.AZURE_HOST }}
          username: ${{ secrets.AZURE_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}

          script: |

            cd ~/Notes_Practice/k8s

            kubectl rollout restart deployment frontend -n notes-app

            kubectl rollout restart deployment backend -n notes-app

            kubectl rollout status deployment frontend -n notes-app

            kubectl rollout status deployment backend -n notes-app