apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: notes-ingress
  namespace: notes-app

spec:
  ingressClassName: traefik

  rules:
  - http:

      paths:

      - path: /

        pathType: Prefix

        backend:

          service:

            name: frontend-service

            port:

              number: 80